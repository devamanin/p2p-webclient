<div class="relative h-screen w-full bg-[#010102] flex flex-col items-center justify-center overflow-hidden">
  
  <!-- Main Column -->
  <div class="flex flex-col items-center justify-center w-full max-w-lg px-6">
    
    <!-- Logo Container -->
    <div class="relative w-44 h-44 mb-10">
      <img src="/assets/logo.svg" class="relative z-10 w-full h-full brightness-200 animate-logo-reveal" alt="Logo">
      <img src="/assets/logo.svg" class="absolute inset-0 z-0 w-full h-full opacity-0 animate-glitch-cyan filter-cyan" alt="">
      <img src="/assets/logo.svg" class="absolute inset-0 z-0 w-full h-full opacity-0 animate-glitch-magenta filter-magenta" alt="">
      <div class="absolute inset-4 bg-[#69DAFF]/10 blur-3xl rounded-full animate-pulse"></div>
    </div>

    <!-- App Name -->
    <div class="relative mb-20 text-center">
      <h1 class="text-[28px] md:text-[32px] font-black tracking-[4px] text-white animate-text-reveal" 
          style="font-family: 'Space Grotesk', sans-serif;">
        blynq.app
      </h1>
      <!-- Text Glitch Layers -->
      <h1 class="absolute inset-0 text-[28px] md:text-[32px] font-black tracking-[4px] text-cyan-400 opacity-0 animate-glitch-text-cyan pointer-events-none" 
          style="font-family: 'Space Grotesk', sans-serif;">
        blynq.app
      </h1>
      <h1 class="absolute inset-0 text-[28px] md:text-[32px] font-black tracking-[4px] text-pink-500 opacity-0 animate-glitch-text-magenta pointer-events-none" 
          style="font-family: 'Space Grotesk', sans-serif;">
        blynq.app
      </h1>
    </div>

    <!-- Login Button (Visible when showLoginButton is true) -->
    <div class="transition-all duration-1000 transform flex flex-col items-center" 
         [ngClass]="showLoginButton ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-10 scale-95 pointer-events-none'">
      
      <button (click)="handleSignIn()" [disabled]="isSigningIn"
        class="flex items-center space-x-4 bg-white hover:bg-gray-100 text-[#3C4043] px-12 py-4 rounded-full font-bold shadow-2xl transition-all active:scale-95 disabled:opacity-70">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/120px-Google_%22G%22_logo.svg.png" 
             class="w-6 h-6" alt="Google">
        <span class="text-lg font-plus">{{ isSigningIn ? 'Signing in...' : 'Continue with Google' }}</span>
      </button>
      
      <div class="mt-8 flex flex-col items-center space-y-4">
        <a routerLink="/" class="text-[#69DAFF] font-bold text-sm hover:text-white transition-colors underline underline-offset-4">What is blynq.app?</a>
        <p class="text-white/20 text-[10px] font-bold tracking-widest uppercase">Secure Login via Google</p>
      </div>
    </div>
  </div>

</div>

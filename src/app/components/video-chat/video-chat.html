<div class="h-screen w-full bg-[#0E0E11] flex flex-col relative overflow-hidden">
  <!-- Main: Two video panels -->
  <main class="flex-1 flex items-center justify-center px-4 md:px-8 py-4 relative z-10">
    <div class="flex flex-col md:flex-row gap-4 w-full max-w-5xl h-full max-h-[75vh]">
      
      <!-- Left: Your Video -->
      <div class="flex-1 relative rounded-3xl overflow-hidden border-2 border-white/10 bg-[#16161D] min-h-0">
        <video #localVideo autoplay playsinline muted class="w-full h-full object-cover scale-x-[-1]"></video>
        <div class="absolute bottom-3 left-3 bg-black/50 backdrop-blur-sm px-3 py-1 rounded-full flex items-center space-x-1.5">
          <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
          <span class="text-[11px] font-bold text-white/80">You</span>
        </div>
      </div>

      <!-- Right: Peer Video -->
      <div class="flex-1 relative rounded-3xl overflow-hidden border-2 bg-[#16161D] min-h-0"
        [ngClass]="isConnected ? 'border-green-500/30' : 'border-white/10'">
        <video #remoteVideo autoplay playsinline class="w-full h-full object-cover transition-all duration-300" [ngClass]="{'opacity-0': !isConnected, 'blur-3xl scale-110': isNSFW}"></video>
        
        <!-- NSFW Warning Overlay -->
        <div *ngIf="isNSFW" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 z-20">
          <div class="bg-black/60 backdrop-blur-md p-6 rounded-2xl flex flex-col items-center text-center border border-red-500/30 max-w-[80%] shadow-2xl">
            <span class="material-icons text-5xl text-red-500 mb-3">visibility_off</span>
            <h3 class="text-white font-bold text-lg mb-1">Inappropriate Content</h3>
            <p class="text-white/70 text-sm">Video has been blurred automatically to protect your experience.</p>
          </div>
        </div>

        <!-- Connecting state -->
        <div *ngIf="!isConnected" class="absolute inset-0 flex flex-col items-center justify-center">
          <div class="w-16 h-16 border-4 border-t-[#69DAFF] border-gray-800 rounded-full animate-spin mb-3"></div>
          <p class="text-sm font-bold text-white/40 tracking-wide">Connecting...</p>
        </div>

        <!-- Peer label -->
        <div class="absolute bottom-3 left-3 bg-black/50 backdrop-blur-sm px-3 py-1 rounded-full flex items-center space-x-1.5">
          <div class="w-2 h-2 rounded-full" [ngClass]="isConnected ? 'bg-green-400 animate-pulse' : 'bg-white/20'"></div>
          <span class="text-[11px] font-bold" [ngClass]="isConnected ? 'text-white/80' : 'text-white/40'">
            {{ remoteMetadata?.name || 'Stranger' }}
          </span>
        </div>

        <!-- Peer info (top-left when connected) -->
        <div *ngIf="remoteMetadata && isConnected" class="absolute top-3 left-3 bg-black/40 backdrop-blur-sm px-3 py-1.5 rounded-xl flex items-center space-x-2">
          <span class="text-xs text-white/60">{{ remoteMetadata.location || '' }}</span>
        </div>
      </div>

    </div>
  </main>

  <!-- Controls (Bottom) -->
  <div class="z-30 px-6 pb-6 pt-2 flex items-center justify-center">
    <div class="flex items-center space-x-3 px-5 py-3 bg-black/60 backdrop-blur-2xl rounded-full border border-white/15 shadow-2xl">
      
      <!-- Home Button -->
      <button (click)="handleHome()" class="w-12 h-12 rounded-full flex items-center justify-center bg-white/5 text-red-500 hover:bg-white/15 transition-all duration-200 active:scale-90 border border-red-500/20">
        <span class="material-icons text-[20px]">home</span>
      </button>

      <button (click)="toggleMute()" class="w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 active:scale-90" 
        [ngClass]="isMuted ? 'bg-red-500 text-white' : 'bg-white/10 text-white hover:bg-white/15'">
        <span class="material-icons text-[20px]">{{ isMuted ? 'mic_off' : 'mic' }}</span>
      </button>

      <!-- Next Button -->
      <button (click)="handleNext()" class="h-12 bg-gradient-to-r from-[#69DAFF] to-[#00A3FF] hover:brightness-110 px-8 rounded-full flex items-center space-x-2 text-white transition-all duration-200 active:scale-95 shadow-lg shadow-cyan-500/20">
        <span class="material-icons text-[22px]">skip_next</span>
        <span class="text-xs font-black uppercase tracking-widest">Next Match</span>
      </button>

      <button (click)="toggleCamera()" class="w-12 h-12 rounded-full flex items-center justify-center transition-all duration-200 active:scale-90"
        [ngClass]="isCameraOff ? 'bg-red-500 text-white' : 'bg-white/10 text-white hover:bg-white/15'">
        <span class="material-icons text-[20px]">{{ isCameraOff ? 'videocam_off' : 'videocam' }}</span>
      </button>
    </div>
  </div>
</div>
